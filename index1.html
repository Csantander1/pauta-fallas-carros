<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Digital Fallas</title>

<style>
body {
    font-family: Arial;
    margin: 10px;
    background: #f4f6f9;
}

h2 {
    background: #1e3a8a;
    color: white;
    padding: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    padding: 12px;
    width: 100%;
    margin-top: 10px;
    background: #2563eb;
    color: white;
    border: none;
    font-size: 16px;
}
</style>

</head>
<body>

<h2>Datos Generales</h2>

<input type="text" id="carro" placeholder="N° Carro">
<input type="text" id="ot" placeholder="OT">
<input type="date" id="fechaInicio">
<input type="date" id="fechaTermino">

<h2>Sistema</h2>
<select id="sistema">
<option>Freno</option>
<option>Enganche</option>
<option>Descarga</option>
<option>Rodado</option>
<option>Estructura</option>
<option>Carga</option>
<option>Residuos</option>
</select>

<h2>Falla</h2>
<input type="text" id="parte" placeholder="Parte">
<input type="text" id="sintoma" placeholder="Síntoma">

<h2>5 Porqués</h2>
<textarea id="p1"></textarea>
<textarea id="p2"></textarea>
<textarea id="p3"></textarea>
<textarea id="p4"></textarea>
<textarea id="p5"></textarea>

<h2>6M</h2>
<label><input type="checkbox" value="ManoObra"> Mano de Obra</label>
<label><input type="checkbox" value="Metodo"> Método</label>
<label><input type="checkbox" value="Material"> Material</label>
<label><input type="checkbox" value="Maquinaria"> Maquinaria</label>
<label><input type="checkbox" value="MedioAmbiente"> Medio Ambiente</label>
<label><input type="checkbox" value="Operacion"> Operación</label>

<h2>Acción Correctiva</h2>
<textarea id="accion"></textarea>

<h2>Fotos</h2>
<input type="file" id="foto" multiple>

<button onclick="enviar()">Enviar</button>

<script>
function enviar() {

    // CAPTURA DE DATOS
    const data = {
        carro: document.getElementById("carro").value,
        ot: document.getElementById("ot").value,
        fechaInicio: document.getElementById("fechaInicio").value,
        fechaTermino: document.getElementById("fechaTermino").value,
        sistema: document.getElementById("sistema").value,
        parte: document.getElementById("parte").value,
        sintoma: document.getElementById("sintoma").value,

        p1: document.getElementById("p1").value,
        p2: document.getElementById("p2").value,
        p3: document.getElementById("p3").value,
        p4: document.getElementById("p4").value,
        p5: document.getElementById("p5").value,

        causas6m: obtenerCausas6M(),
        justificacion: "", // lo agregamos después
        accion: document.getElementById("accion").value,

        colaborador: "",
        supervisor: "",
        observaciones: ""
    };

    fetch("https://script.google.com/macros/s/AKfycbx9HT6inn1h6v1-pwLba4oJK4OgCaPAnfEMDtEjtQWoHTDEJ4nQ9L7BtGWeYItl7piL/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {
        console.log(res);
        alert("Pauta enviada correctamente");
    })
    .catch(err => {
        console.error(err);
        alert("Error al enviar");
    });
}
  function obtenerCausas6M() {
    let causas = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
        causas.push(el.value);
    });
    return causas.join(", ");
}
</script>

</body>
</html>
