<script>
let firmaColaboradorRealizada = false;

function obtenerCausas6M() {
    let causas = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
        causas.push(el.value);
    });
    return causas.join(", ");
}

function prepararFirma(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");

    function ajustarCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = 160;
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000000";
    }

    ajustarCanvas();

    let dibujando = false;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
            x: touch.clientX - rect.left,
            y: touch.clientY - rect.top
        };
    }

    function iniciar(e) {
        e.preventDefault();
        dibujando = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function dibujar(e) {
        if (!dibujando) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        firmaColaboradorRealizada = true;
    }

    function terminar(e) {
        e.preventDefault();
        dibujando = false;
    }

    canvas.addEventListener("mousedown", iniciar);
    canvas.addEventListener("mousemove", dibujar);
    canvas.addEventListener("mouseup", terminar);
    canvas.addEventListener("mouseleave", terminar);

    canvas.addEventListener("touchstart", iniciar);
    canvas.addEventListener("touchmove", dibujar);
    canvas.addEventListener("touchend", terminar);
}

function limpiarFirma(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    firmaColaboradorRealizada = false;
}

window.onload = function() {
    prepararFirma("firmaColaborador");
};

function validarFormulario() {
    if (!document.getElementById("carro").value.trim()) {
        alert("Debe ingresar el N° de Carro");
        return false;
    }

    if (!document.getElementById("ot").value.trim()) {
        alert("Debe ingresar la OT");
        return false;
    }

    if (!document.getElementById("fechaInicio").value) {
        alert("Debe ingresar la fecha de inicio");
        return false;
    }

    if (!document.getElementById("fechaTermino").value) {
        alert("Debe ingresar la fecha de término");
        return false;
    }

    if (!document.getElementById("sistema").value) {
        alert("Debe seleccionar un sistema");
        return false;
    }

    if (!document.getElementById("parte").value.trim()) {
        alert("Debe ingresar la parte afectada");
        return false;
    }

    if (!document.getElementById("sintoma").value.trim()) {
        alert("Debe ingresar el síntoma");
        return false;
    }

    if (!document.getElementById("p1").value.trim()) {
        alert("Debe ingresar ¿Por qué 1?");
        return false;
    }

    if (!document.getElementById("p2").value.trim()) {
        alert("Debe ingresar ¿Por qué 2?");
        return false;
    }

    if (!document.getElementById("p3").value.trim()) {
        alert("Debe ingresar ¿Por qué 3?");
        return false;
    }

    if (!obtenerCausas6M()) {
        alert("Debe seleccionar al menos una causa 6M");
        return false;
    }

    if (!document.getElementById("justificacion").value.trim()) {
        alert("Debe ingresar la justificación de la causa");
        return false;
    }

    if (!document.getElementById("accion").value.trim()) {
        alert("Debe ingresar la acción correctiva");
        return false;
    }

    if (!document.getElementById("colaborador").value.trim()) {
        alert("Debe ingresar el nombre del colaborador");
        return false;
    }

    if (!firmaColaboradorRealizada) {
        alert("Debe ingresar la firma del colaborador");
        return false;
    }

    return true;
}

function enviar() {
    const archivos = document.getElementById("foto").files;

    if (archivos.length > 2) {
        alert("Solo puedes subir máximo 2 fotos.");
        return;
    }

    for (let i = 0; i < archivos.length; i++) {
        if (archivos[i].size > 6000000) {
            alert("La foto " + archivos[i].name + " pesa más de 6 MB. Debe comprimirse antes de enviar.");
            return;
        }
    }

    if (!validarFormulario()) {
        return;
    }

    let fotos = [];

    const leerArchivos = Array.from(archivos).map(file => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                fotos.push({
                    nombre: file.name,
                    tipo: file.type,
                    base64: e.target.result.split(",")[1]
                });
                resolve();
            };
            reader.readAsDataURL(file);
        });
    });

    Promise.all(leerArchivos).then(() => {
        const data = {
            carro: document.getElementById("carro").value,
            ot: document.getElementById("ot").value,
            fechaInicio: document.getElementById("fechaInicio").value,
            fechaTermino: document.getElementById("fechaTermino").value,
            sistema: document.getElementById("sistema").value,
            parte: document.getElementById("parte").value,
            sintoma: document.getElementById("sintoma").value,
            p1: document.getElementById("p1").value,
            p2: document.getElementById("p2").value,
            p3: document.getElementById("p3").value,
            p4: document.getElementById("p4").value,
            p5: document.getElementById("p5").value,
            causas6m: obtenerCausas6M(),
            justificacion: document.getElementById("justificacion").value,
            accion: document.getElementById("accion").value,
            colaborador: document.getElementById("colaborador").value,
            supervisor: document.getElementById("supervisor").value,
            firmaColaborador: document.getElementById("firmaColaborador").toDataURL("image/png"),
            observaciones: document.getElementById("observaciones").value,
            fotos: fotos
        };

        fetch("https://script.google.com/macros/s/AKfycbz1lTcD9hz14fk3_uqo4iLIXC9N-GBxojtt0eURCs53TvCOvmLSaMV8sKrLeYfU2kJ7/exec", {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(res => {
            console.log("Respuesta Apps Script:", res);

            if (res.includes("OK")) {
                alert("Pauta enviada correctamente");
            } else {
                alert("ERROR desde Apps Script: " + res);
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error al enviar la pauta");
        });
    });
}
</script>
